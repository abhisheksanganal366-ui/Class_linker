<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Announcements</title>
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar student-nav">
    <div class="nav-brand">📚 ClassLinker</div>
    <div class="nav-user">
        <a th:href="@{/student/dashboard}" class="btn btn-sm btn-outline">← Dashboard</a>
        <a th:href="@{/logout}" class="btn btn-sm btn-outline">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="page-header"><h2>📢 Announcements</h2></div>
    <div class="card-list">
        <div th:each="ann : ${announcements}" class="card">
            <div class="card-header">
                <h3 th:text="${ann.title}"></h3>
                <span class="badge" th:text="${ann.createdAt}"></span>
            </div>
            <p th:text="${ann.content}"></p>
            <div class="card-footer">
                <span>By: <strong th:text="${ann.lecturerName}"></strong></span>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">No announcements yet.</div>
    </div>
</div>
</body>
</html>

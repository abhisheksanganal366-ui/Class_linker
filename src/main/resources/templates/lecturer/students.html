<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Students</title>
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar lecturer-nav">
    <div class="nav-brand">📚 ClassLinker</div>
    <div class="nav-user">
        <a th:href="@{/lecturer/dashboard}" class="btn btn-sm btn-outline">← Dashboard</a>
        <a th:href="@{/logout}" class="btn btn-sm btn-outline">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2>👥 Student Management</h2>
        <button class="btn btn-success" onclick="openModal('addModal')">+ Add Student</button>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div class="table-wrap">
        <table class="table">
            <thead>
                <tr><th>Name</th><th>Roll No</th><th>Email</th><th>Phone</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.rollNumber}"></td>
                    <td th:text="${s.email}"></td>
                    <td th:text="${s.phone}"></td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                            th:onclick="|openEditStudent(${s.id},'${s.name}','${s.email}','${s.phone}','${s.rollNumber}')|">
                            Edit</button>
                        <a th:href="@{'/lecturer/students/delete/' + ${s.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete student?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(students)}" class="empty-state">No students registered yet.</div>
    </div>
</div>

<!-- Add Modal -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Add Student</h3>
            <span class="close" onclick="closeModal('addModal')">&times;</span></div>
        <form th:action="@{/lecturer/students/add}" method="post">
            <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Roll Number</label><input type="text" name="rollNumber" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Phone</label><input type="text" name="phone" required></div>
            <p class="hint">Default password: <strong>student123</strong></p>
            <button type="submit" class="btn btn-success btn-full">Add Student</button>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Edit Student</h3>
            <span class="close" onclick="closeModal('editModal')">&times;</span></div>
        <form th:action="@{/lecturer/students/edit}" method="post">
            <input type="hidden" id="editStudentId" name="id">
            <div class="form-group"><label>Name</label><input type="text" id="editStudentName" name="name" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="editStudentEmail" name="email" required></div>
            <div class="form-group"><label>Phone</label><input type="text" id="editStudentPhone" name="phone"></div>
            <div class="form-group"><label>Roll Number</label><input type="text" id="editStudentRoll" name="rollNumber"></div>
            <button type="submit" class="btn btn-primary btn-full">Update</button>
        </form>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

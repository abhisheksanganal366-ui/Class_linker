<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Assignments</title>
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar lecturer-nav">
    <div class="nav-brand">📚 ClassLinker</div>
    <div class="nav-user">
        <a th:href="@{/lecturer/dashboard}" class="btn btn-sm btn-outline">← Dashboard</a>
        <a th:href="@{/logout}" class="btn btn-sm btn-outline">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2>📝 Assignments</h2>
        <button class="btn btn-success" onclick="openModal('addModal')">+ Create Assignment</button>
    </div>
    <div class="card-list">
        <div th:each="a : ${assignments}" class="card">
            <div class="card-header">
                <h3 th:text="${a.title}"></h3>
                <span class="badge badge-orange">Due: <span th:text="${a.dueDate}"></span></span>
            </div>
            <p th:text="${a.description}"></p>
            <div class="card-footer">
                <span>Total Marks: <strong th:text="${a.totalMarks}"></strong></span>
                <a th:href="@{'/lecturer/assignments/' + ${a.id} + '/submissions'}"
                   class="btn btn-primary btn-sm">Manage Submissions</a>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(assignments)}" class="empty-state">No assignments yet.</div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Create Assignment</h3>
            <span class="close" onclick="closeModal('addModal')">&times;</span></div>
        <form th:action="@{/lecturer/assignments/add}" method="post">
            <div class="form-group"><label>Title</label>
                <input type="text" name="title" required></div>
            <div class="form-group"><label>Description</label>
                <textarea name="description" rows="3"></textarea></div>
            <div class="form-group"><label>Due Date</label>
                <input type="date" name="dueDate" required></div>
            <div class="form-group"><label>Total Marks</label>
                <input type="number" name="totalMarks" min="1" required></div>
            <button type="submit" class="btn btn-success btn-full">Create</button>
        </form>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
